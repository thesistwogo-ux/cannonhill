name: Deploy Cannonhill to GitHub Pages

# Deploys the static site on every push to main, and lets you trigger it
# manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# only one deploy at a time; newer pushes cancel in-flight ones
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Publish only the files the game needs (skips the dev/test scripts).
      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html game.js manifest.webmanifest sw.js _site/
          cp -r icons _site/
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
